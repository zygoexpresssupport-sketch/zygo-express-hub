<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#f97316"/>
<title>FAQ — Zygo Express</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--orange:#f97316;--ink:#0f0f0f;--paper:#fafaf8;--stone:#e8e4dc;--muted:#9c9589;--r:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;}
.topbar{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--ink);position:sticky;top:0;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:34px;height:34px;background:var(--orange);border-radius:8px;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:900;font-size:15px;color:white;}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:white;}
.logo-name em{color:var(--orange);font-style:normal;}
.back-link{color:rgba(255,255,255,0.6);font-size:13px;text-decoration:none;}
.hero{background:var(--orange);padding:36px 20px 44px;text-align:center;}
.hero-title{font-family:'Syne',sans-serif;font-weight:900;font-size:30px;color:white;letter-spacing:-1px;margin-bottom:8px;}
.hero-sub{color:rgba(255,255,255,0.85);font-size:14px;}
.content{padding:20px 16px 40px;max-width:600px;margin:0 auto;}
.faq-item{background:white;border:1px solid var(--stone);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--ink);text-align:left;gap:12px;}
.faq-icon{font-size:18px;flex-shrink:0;transition:transform 0.2s;color:var(--orange);}
.faq-a{padding:0 18px 16px;font-size:13px;color:var(--muted);line-height:1.7;display:none;}
.faq-item.open .faq-a{display:block;}
.faq-item.open .faq-icon{transform:rotate(45deg);}
.cta-box{background:var(--ink);border-radius:16px;padding:24px;text-align:center;margin-top:20px;}
.cta-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:white;margin-bottom:8px;}
.cta-sub{font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:16px;}
.cta-btn{display:inline-block;background:var(--orange);color:white;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:12px 24px;border-radius:10px;text-decoration:none;}
</style>
</head>
<body>
<div class="topbar">
  <a href="https://zygo-express-hub.lovable.app" class="logo">
    <div class="logo-mark">ZE</div>
    <div class="logo-name">Zygo<em>Express</em></div>
  </a>
  <a href="https://zygo-express-hub.lovable.app" class="back-link">← Back</a>
</div>

<div class="hero">
  <div class="hero-title">Frequently Asked Questions</div>
  <div class="hero-sub">Everything you need to know about Zygo Express</div>
</div>

<div class="content">
  <div id="faq-list"></div>
  <div class="cta-box">
    <div class="cta-title">Still have questions?</div>
    <div class="cta-sub">Our team is always happy to help</div>
    <a href="https://wa.me/233240393582?text=Hello Zygo Express, I have a question." class="cta-btn">💬 Chat on WhatsApp</a>
  </div>
</div>

<script>
const FAQS = [
  {q:"How do I book a delivery?",a:"Visit our booking page, enter your name, phone, pickup and drop-off location. Your delivery is confirmed instantly and you get a unique tracking ID. The whole process takes less than 60 seconds."},
  {q:"How much does delivery cost?",a:"Pricing is zone-based. Zone 1 (0–2km) = GHS 13, Zone 2 (2.1–4km) = GHS 16, Zone 3 (4.1–6km) = GHS 20, Zone 4 (6.1–9km) = GHS 30. The price is calculated automatically when you enter your locations."},
  {q:"How do I track my parcel?",a:"Every booking gets a unique tracking ID (e.g. ZGX-ABC123). Enter this on our website's Track Parcel section to see real-time status — from confirmation through pickup, transit, and delivery."},
  {q:"How do I pay?",a:"We accept MTN Mobile Money (MoMo). Send payment to 0240393582 (Zygo Express) via *170# and use your tracking ID as the reference. Our team confirms payment and activates your delivery."},
  {q:"How long does delivery take?",a:"We offer same-day delivery across Wa. Most deliveries within Wa Municipal are completed within 1–3 hours of pickup. You can track your rider live on your phone."},
  {q:"What areas do you serve?",a:"We currently serve Wa Municipal and surrounding communities in Upper West Region. This includes Kpaguri, Jahan, Ssnit, Dobile, Nakori, Kparimbo, Sing, Kperisi and more."},
  {q:"What items can I send?",a:"Documents, parcels, food, medication, groceries, clothing and most everyday items. For fragile or oversized items, mention this in the parcel details when booking."},
  {q:"Is Zygo Express registered?",a:"Yes. Zygo Express is a legally registered delivery business in Wa, Upper West Ghana. We are fully compliant and committed to professional, trustworthy service."},
];

const list = document.getElementById('faq-list');
FAQS.forEach((f,i) => {
  const item = document.createElement('div');
  item.className = 'faq-item';
  item.innerHTML = `<button class="faq-q" onclick="toggle(${i})"><span>${f.q}</span><span class="faq-icon">+</span></button><div class="faq-a">${f.a}</div>`;
  list.appendChild(item);
});

function toggle(i){
  const items = document.querySelectorAll('.faq-item');
  items.forEach((item,j) => { if(j!==i) item.classList.remove('open'); });
  items[i].classList.toggle('open');
}
</script>
</body>
</html>
